{% extends 'news/base.html' %}

{% block content %}
<h1>Articles</h1>

{% for article in articles %}
    <div>
        <h2>
            <a href="{% url 'article_detail' article.id %}">
                {{ article.title }}
            </a>
        </h2>
        <p>By {{ article.author.username }}</p>
        <p>{{ article.created_at }}</p>
    </div>
    <hr>
{% empty %}
    <p>No approved articles yet.</p>
{% endfor %}

{% endblock %}
