{% extends 'news/base.html' %}

{% block content %}
<h1>Delete Newsletter</h1>

<p>Are you sure you want to delete "{{ newsletter.title }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
</form>

<a href="{% url 'newsletter_detail' newsletter.id %}">Cancel</a>
{% endblock %}
