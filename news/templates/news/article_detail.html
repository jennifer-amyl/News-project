{% extends 'news/base.html' %}

{% block content %}
<h1>{{ article.title }}</h1>

<p>By {{ article.author.username }}</p>

{% if article.publisher %}
    <p>Publisher: {{ article.publisher.name }}</p>
{% else %}
    <p>Independent journalist article</p>
{% endif %}

<p>{{ article.created_at }}</p>

<hr>

<p>{{ article.content }}</p>

{% endblock %}
